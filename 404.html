<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — BlackRoad OS</title>
  <link rel="stylesheet" href="/_shared/design.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .error-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--sp-xl) var(--sp-lg);
    }

    .error-content {
      max-width: 520px;
    }

    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--sp-lg);
    }

    .error-title {
      font-family: var(--font-headline);
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 700;
      color: var(--white);
      margin-bottom: var(--sp-sm);
    }

    .error-subtitle {
      font-size: 0.95rem;
      color: var(--subtle);
      margin-bottom: var(--sp-xl);
    }

    .error-actions {
      display: flex;
      gap: var(--sp-md);
      justify-content: center;
      flex-wrap: wrap;
    }

    .animated-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg,
        var(--ember), var(--rose), var(--magenta),
        var(--violet), var(--azure), var(--cyan),
        var(--ember)
      );
      background-size: 200% 100%;
      animation: bar-shift 4s linear infinite;
    }

    @keyframes bar-shift {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
</head>
<body>

  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <div class="error-title">This road doesn't exist yet.</div>
      <div class="error-subtitle">But we're paving new ones every day.</div>
      <div class="error-actions">
        <a href="/" class="btn-primary">Go Home</a>
        <a href="/cards.html" class="btn-ghost">View Apps</a>
        <a href="/docs.html" class="btn-ghost">Read Docs</a>
      </div>
    </div>
  </div>

  <div class="animated-bar"></div>

<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
